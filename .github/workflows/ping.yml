name: Keep Render Awake

on:
  schedule:
    - cron: "*/14 * * * *" # Runs every 14 mins
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend with retry
        run: |
          # Use --retry to handle the "Cold Start" delay
          curl -s --connect-timeout 60 --retry 5 --retry-delay 5 https://chatting-app-nestjs.onrender.com/health
          echo "Ping successful at $(date)"
