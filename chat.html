<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>O-chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-80 bg-gray-100 border-r flex flex-col">

    <!-- TOP -->
    <div class="h-14 flex items-center justify-between px-4 border-b">
      <h2 class="font-semibold">Chats</h2>
      <button onclick="openCreateGroupModal()" class="text-sm bg-blue-500 text-white px-3 py-1 rounded-md">
        + New
      </button>
    </div>

    <!-- SEARCH -->
    <div class="p-3 border-b">
      <input
        id="user-search"
        type="text"
        placeholder="Search..."
        oninput="handleUserSearchInput()"
        class="w-full px-3 py-2 rounded-md border outline-none focus:ring-2 focus:ring-blue-400"
      />
    </div>

    <!-- CHAT LIST -->
    <ul id="users-list" class="flex-1 overflow-y-auto">
      <!-- dynamic users -->
    </ul>

  </aside>

  <!-- CHAT AREA -->
  <main class="flex-1 flex flex-col bg-white">

    <!-- HEADER -->
    <div id="chat-header" class="h-14 border-b flex items-center px-4 gap-3">
      <img id="target-avatar" class="w-10 h-10 rounded-full bg-gray-300"/>
      <div>
        <p id="target-name" class="font-medium text-sm">Select Chat</p>
        <p id="target-status" class="text-xs text-gray-500">Offline</p>
      </div>
    </div>

    <!-- EMPTY STATE -->
    <div id="empty-state" class="flex-1 flex items-center justify-center text-gray-400">
      Select a chat to start messaging
    </div>

    <!-- MESSAGES -->
    <div id="message-container" class="hidden flex-1 overflow-y-auto p-4 space-y-3">
      <div id="messages-list" class="flex flex-col gap-2"></div>
    </div>

    <!-- INPUT -->
    <div id="input-area" class="hidden h-16 border-t flex items-center px-3 gap-2">

      <input
        id="msg-input"
        type="text"
        placeholder="Type a message..."
        class="flex-1 px-3 py-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-400"
        onkeydown="handleComposerKeydown(event)"
      />

      <button
        onclick="sendMessage()"
        class="bg-blue-500 text-white px-4 py-2 rounded-md"
      >
        Send
      </button>

    </div>

  </main>

</div>

<script>
  // OPTIONAL: minimal UI helpers so your app doesn't feel dead

  function openChatUI() {
    document.getElementById("empty-state").classList.add("hidden");
    document.getElementById("message-container").classList.remove("hidden");
    document.getElementById("input-area").classList.remove("hidden");
  }

  function renderUser(user) {
    const li = document.createElement("li");
    li.className = "p-3 hover:bg-gray-200 cursor-pointer flex gap-3 items-center";

    li.innerHTML = `
      <div class="w-10 h-10 bg-gray-300 rounded-full"></div>
      <div class="flex-1">
        <p class="text-sm font-medium">${user.name}</p>
        <p class="text-xs text-gray-500 truncate">${user.lastMessage || ""}</p>
      </div>
    `;

    li.onclick = () => {
      openChatUI();
      document.getElementById("target-name").innerText = user.name;
    };

    return li;
  }

  function renderMessage(text, isMe = false) {
    const div = document.createElement("div");
    div.className = isMe ? "flex justify-end" : "flex";

    div.innerHTML = `
      <div class="${isMe ? 'bg-blue-500 text-white' : 'bg-gray-200'} px-4 py-2 rounded-lg text-sm max-w-xs">
        ${text}
      </div>
    `;

    document.getElementById("messages-list").appendChild(div);
  }
</script>

</body>
</html>
