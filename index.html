<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>O-chat</title>
    <link rel="stylesheet" href="/public/app.css?v=20260321" />
  </head>

  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main
      class="mx-auto flex min-h-screen max-w-xl items-center justify-center p-6"
    >
      <section
        class="glass w-full rounded-[28px] border border-white/70 bg-white p-8 shadow-[0_30px_120px_rgba(15,23,42,0.12)]"
      >
        <p
          class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500"
        >
          O-chat
        </p>
        <h1 class="mt-4 text-3xl font-bold text-slate-900">
          Launching your workspace...
        </h1>
        <p class="mt-3 text-sm leading-6 text-slate-500">
          We only load the heavy chat runtime when you actually open chats.
        </p>
        <div class="mt-8 grid gap-3 sm:grid-cols-2">
          <a
            href="/auth"
            class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
          >
            Open Auth
          </a>
          <a
            href="/chat"
            class="rounded-2xl bg-blue-600 px-4 py-3 text-center text-sm font-semibold text-white transition hover:bg-blue-700"
          >
            Open Chats
          </a>
        </div>
      </section>
    </main>

    <script>
      const nextPath = localStorage.getItem('chat_token') ? '/chat' : '/auth';
      window.location.replace(nextPath);
    </script>
  </body>
</html>
