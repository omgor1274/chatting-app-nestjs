<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7e8e2" />
    <meta
      name="description"
      content="O-chat is a secure messaging app for private conversations, groups, and desktop-friendly communication."
    />
    <title>O-chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700;800&family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,600;8..144,700;8..144,800&display=swap"
      rel="stylesheet"
    />
    <script>
      if (localStorage.getItem('chat_dark_mode') === '1') {
        document.documentElement.classList.add('prefers-dark-mode');
      }
    </script>
    <link
      rel="preload"
      href="/public/tailwind.css?v=20260429-perf1"
      as="style"
    />
    <link rel="stylesheet" href="/public/tailwind.css?v=20260429-perf1" />
    <link rel="stylesheet" href="/public/app.css?v=20260429-perf1" />
  </head>

  <body
    class="landing-page mobile-page min-h-screen bg-slate-100 text-slate-900"
  >
    <main
      class="landing-shell mobile-page-shell mx-auto flex min-h-screen max-w-6xl items-center justify-center p-6"
    >
      <section
        class="landing-card loader-card glass w-full overflow-hidden rounded-[32px] border border-white/70 bg-white p-8 shadow-[0_30px_120px_rgba(15,23,42,0.12)]"
      >
        <div class="loader-card-glow" aria-hidden="true"></div>
        <div class="landing-grid relative z-[1]">
          <div class="landing-copy">
            <p class="landing-kicker">O-chat</p>
            <h1 class="landing-title display-font">
              Serious messaging, calmer surfaces.
            </h1>
            <p class="mt-4 max-w-md text-sm leading-7 text-slate-500">
              Open a warm, high-density messaging workspace built to stay clear
              even when conversations never slow down.
            </p>
            <div class="landing-actions mt-8 grid gap-3 sm:grid-cols-2">
              <a
                href="/auth"
                class="ui-secondary-btn rounded-2xl border border-slate-200 bg-white px-4 py-3 text-center text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
              >
                Open Auth
              </a>
              <a
                href="/chat"
                class="ui-primary-btn rounded-2xl bg-blue-600 px-4 py-3 text-center text-sm font-semibold text-white transition hover:bg-blue-700"
              >
                Open Chats
              </a>
            </div>
          </div>
          <div class="landing-visual">
            <div class="loader-stage" aria-hidden="true">
              <div class="loader-orbit loader-orbit-outer"></div>
              <div class="loader-orbit loader-orbit-middle"></div>
              <div class="loader-core">
                <span>O</span>
              </div>
              <div class="loader-pulse loader-pulse-one"></div>
              <div class="loader-pulse loader-pulse-two"></div>
            </div>
            <p
              class="mt-6 text-sm font-semibold uppercase tracking-[0.24em] text-slate-500"
            >
              Workspace Sync
            </p>
            <div class="loader-progress" aria-hidden="true">
              <span class="loader-progress-bar"></span>
            </div>
            <div class="loader-status-row" aria-hidden="true">
              <span class="loader-status-pill">Session</span>
              <span class="loader-status-pill">Chats</span>
              <span class="loader-status-pill">Realtime</span>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/runtime-config.js?v=20260429-perf1"></script>
    <script>
      if (window.location.pathname === '/') {
        const nextPath = localStorage.getItem('chat_token') ? '/chat' : '/auth';
        window.location.replace(nextPath);
      }
    </script>
  </body>
</html>
